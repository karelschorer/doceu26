name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm turbo run typecheck
      - run: pnpm turbo run lint
      - run: pnpm turbo run build
      - run: pnpm turbo run test

  backend:
    name: Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: services/go.work.sum
      - name: Build
        working-directory: services
        run: go build ./...
      - name: Test
        working-directory: services
        run: go test ./...
      - name: Vet
        working-directory: services
        run: go vet ./...

  deploy:
    name: Deploy to EC2
    needs: [frontend, backend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm turbo run build

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - name: Build chat service
        working-directory: services/chat
        run: GOOS=linux GOARCH=amd64 go build -o chat-service ./cmd/server/

      - name: Build auth service
        working-directory: services/auth
        run: GOOS=linux GOARCH=amd64 go build -o auth-service ./cmd/server/

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/key.pem
          chmod 600 ~/.ssh/key.pem
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy frontend
        run: |
          rsync -avz --delete -e "ssh -i ~/.ssh/key.pem" \
            apps/web/dist/ ec2-user@${{ secrets.EC2_HOST }}:/var/www/doceu26/

      - name: Deploy services
        run: |
          scp -i ~/.ssh/key.pem services/chat/chat-service ec2-user@${{ secrets.EC2_HOST }}:/tmp/chat-service
          scp -i ~/.ssh/key.pem services/auth/auth-service ec2-user@${{ secrets.EC2_HOST }}:/tmp/auth-service
          ssh -i ~/.ssh/key.pem ec2-user@${{ secrets.EC2_HOST }} "\
            sudo cp /tmp/chat-service /opt/doceu26/bin/chat-service && \
            sudo cp /tmp/auth-service /opt/doceu26/bin/auth-service && \
            sudo systemctl restart doceu26-chat && \
            sudo systemctl restart doceu26-auth"
