syntax = "proto3";
package auth.v1;
option go_package = "github.com/doceu26/auth/gen/auth/v1;authv1";

message User {
  string id = 1;
  string email = 2;
  string display_name = 3;
}

message LoginRequest {
  string email = 1;
  string password = 2;
}

message LoginResponse {
  string access_token = 1;
  string refresh_token = 2;
  User user = 3;
}

service AuthService {
  rpc Login(LoginRequest) returns (LoginResponse);
}
