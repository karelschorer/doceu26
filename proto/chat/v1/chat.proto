syntax = "proto3";
package chat.v1;
option go_package = "github.com/doceu26/chat/gen/chat/v1;chatv1";

message Message {
  string id = 1;
  string channel_id = 2;
  string user_id = 3;
  string content = 4;
  string created_at = 5;
}

message SendMessageRequest {
  string channel_id = 1;
  string content = 2;
}

message SendMessageResponse {
  Message message = 1;
}

service ChatService {
  rpc SendMessage(SendMessageRequest) returns (SendMessageResponse);
}
