events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    gzip          on;
    gzip_types    text/plain text/css application/json application/javascript text/xml application/xml text/javascript;

    upstream auth_service    { server 127.0.0.1:8081; }
    upstream gateway_service { server 127.0.0.1:8080; }
    upstream chat_service    { server 127.0.0.1:8087; }

    server {
        listen 80;
        server_name _;

        root /var/www/doceu26;
        index index.html;

        # Frontend SPA — serve index.html for all non-API routes
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Auth service (register, login, token refresh, admin users)
        location /api/v1/auth/ {
            proxy_pass         http://auth_service;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/v1/admin/ {
            proxy_pass         http://auth_service;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # All other API calls go to gateway
        location /api/ {
            proxy_pass         http://gateway_service;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 60s;
        }

        # WebSocket for chat
        location /ws {
            proxy_pass          http://chat_service;
            proxy_http_version  1.1;
            proxy_set_header    Upgrade $http_upgrade;
            proxy_set_header    Connection "upgrade";
            proxy_set_header    Host $host;
            proxy_read_timeout  3600s;
        }
    }
}
